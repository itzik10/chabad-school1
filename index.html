<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #800020;
            --accent-color: #d4af37;
            --text-dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('image_401929.jpg'); /* שם הקובץ שהעלית */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-dark);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background-color: rgba(255, 255, 255, 0.75);
            z-index: 1;
        }

        header {
            background-color: rgba(128, 0, 32, 0.9);
            color: var(--white);
            text-align: center;
            padding: 40px 20px;
            border-bottom: 5px solid var(--accent-color);
            position: relative;
            z-index: 2;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }

        h1 { color: var(--primary-color); text-align: center; margin-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }

        .btn-submit { background-color: var(--primary-color); color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        
        footer {
            text-align: center;
            padding: 30px;
            position: relative;
            z-index: 2;
        }
        .footer-name { font-weight: 700; color: var(--primary-color); font-size: 1.2rem; }
    </style>
</head>
